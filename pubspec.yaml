name: doctorine
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  #? for iOS style icons.
  cupertino_icons: ^1.0.8
  #? state management
  flutter_bloc: ^9.1.1

  #? dependency injection
  get_it: ^9.2.1
  #? networking
  dio: ^5.9.2
  pretty_dio_logger: ^1.4.0

  #? flutter icons generator
  flutter_launcher_icons: ^0.14.4
  phone_field_plus: ^1.0.2
  retrofit: ^4.6.0
  json_annotation: ^4.9.0
  flutter_native_splash: ^2.4.4
  flutter_svg: ^2.2.0
  go_router: ^16.1.0
  font_awesome_flutter: ^10.9.1
  device_preview: ^1.2.0
  intl: ^0.19.0
  easy_localization: ^3.0.8
  freezed: ^2.5.8
  freezed_annotation: ^2.4.4


dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  json_serializable: ^6.9.5
  retrofit_generator: ^9.6.0
flutter:
  uses-material-design: true

  assets:
    - assets/images/svgs/
    - assets/images/
    - assets/images/place_holder.png

  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700

  #? flutter assets generator
flutter_assets:
  assets_path: assets/
  output_path: lib/core/constants/
  filename: app_assets.dart
  field_prefix: assets
  classname: AppAssets
