name: doctorine
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  #? for iOS style icons.
  cupertino_icons: ^1.0.8
  #? state management
  flutter_bloc: ^9.1.1
  #? code generator
  freezed: ^3.2.5
  freezed_annotation: ^3.1.0
  #? dependency injection
  get_it: ^9.2.1
  #? code generation for converting to and from JSON
  json_serializable: ^6.14.0
  json_annotation: ^4.12.0
  #? networking
  dio: ^5.9.2
  retrofit: ^4.9.2
  retrofit_generator: ^10.2.6
  pretty_dio_logger: ^1.4.0
  #? localization
  intl: ^0.20.2
  easy_localization: ^3.0.8
  #? native device splash screen
  flutter_native_splash: ^2.4.7
  #? for using svg images
  flutter_svg:
    ^2.3.0
  #? flutter icons generator
  flutter_launcher_icons: ^0.14.4
  go_router: ^17.3.0
  #? for using font awesome icons
  font_awesome_flutter: ^11.0.0
  phone_field_plus: ^1.0.2


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
flutter:
  uses-material-design: true

  assets:
    - assets/images/svgs/
    - assets/images/
    - assets/images/place_holder.png

  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700

  #? flutter assets generator
flutter_assets:
  assets_path: assets/
  output_path: lib/core/constants/
  filename: app_assets.dart
  field_prefix: assets
  classname: AppAssets
